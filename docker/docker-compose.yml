services:
  web:
    build:
      context: ./app
    image: syncdoc-demo-web:1.0.0
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      FEATURE_FLAG: "false"
      SYNC_SOURCE: baseline
    labels:
      com.example.syncdoc: baseline

  worker:
    image: alpine:3.20
    command: ["sh", "-c", "while true; do echo syncdoc worker; sleep 60; done"]
    environment:
      QUEUE_NAME: default
      WORKER_CONCURRENCY: "2"
