services:
  web:
    build:
      context: ./app
    image: syncdoc-demo-web:2.0.0
    ports:
      - "9090:8080"
    environment:
      APP_ENV: stage
      FEATURE_FLAG: "true"
      SYNC_SOURCE: drifted-again
      CACHE_HOST: cache
    labels:
      com.example.syncdoc: drifted-again

  worker:
    image: alpine:3.21
    command: ["sh", "-c", "while true; do echo syncdoc worker; sleep 60; done"]
    environment:
      QUEUE_NAME: priority
      WORKER_CONCURRENCY: "1"

  cache:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_MAXMEMORY: 64mb
