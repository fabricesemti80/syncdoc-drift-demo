- name: Ensure demo packages are present
  ansible.builtin.package:
    name:
      - curl
      - jq
      - htop
      - git
    state: present

- name: Ensure demo user exists
  ansible.builtin.user:
    name: syncdoc
    shell: /usr/sbin/nologin
    state: present

- name: Write baseline marker
  ansible.builtin.copy:
    dest: /etc/syncdoc-demo.conf
    owner: root
    group: root
    mode: "0600"
    content: |
      app_env={{ app_env }}
      syncdoc_state={{ syncdoc_state }}
      managed_by=second-drift
      incident_mode=true

- name: Keep dummy service running
  ansible.builtin.service:
    name: syncdoc-demo
    state: started
    enabled: true
  ignore_errors: true
